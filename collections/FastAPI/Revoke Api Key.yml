info:
  name: Revoke Api Key
  type: http
  seq: 10

http:
  method: DELETE
  url: "{{baseUrl}}/apikey/revoke"
  headers:
    - name: X-API-Key
      value: "{{apiKey}}"
  auth:
    type: apikey
    key: X-API-Key
    value: "{{apiKey}}"
    placement: header

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/apikey/revoke"
      method: DELETE
      headers:
        - name: X-API-Key
          value: "{{apiKey}}"
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: ""

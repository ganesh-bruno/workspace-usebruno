info:
  name: Apikey Profile
  type: http
  seq: 9

http:
  method: GET
  url: "{{baseUrl}}/apikey/profile"
  headers:
    - name: X-API-Key
      value: "{{apiKey}}"
  auth:
    type: apikey
    key: X-API-Key
    value: "{{apiKey}}"
    placement: header

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful Response
    request:
      url: "{{baseUrl}}/apikey/profile"
      method: GET
      headers:
        - name: X-API-Key
          value: "{{apiKey}}"
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: ""

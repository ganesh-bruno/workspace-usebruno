info:
  name: Get all users
  type: http
  seq: 1

http:
  method: GET
  url: "{{baseUrl}}/users"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful response
    request:
      url: "{{baseUrl}}/users"
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          [
            {
              "id": 1,
              "name": "Ganesh",
              "email": "ganesh@example.com"
            }
          ]

docs: Returns a list of users

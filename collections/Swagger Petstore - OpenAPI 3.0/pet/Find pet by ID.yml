info:
  name: Find pet by ID.
  type: http
  seq: 5
  tags:
    - pet

http:
  method: GET
  url: "{{baseUrl}}/pet/:petId"
  headers:
    - name: api_key
      value: "{{apiKey}}"
  params:
    - name: petId
      value: ""
      type: path
      description: ID of pet to return
  auth:
    type: apikey
    key: api_key
    value: "{{apiKey}}"
    placement: header

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: successful operation
    request:
      url: "{{baseUrl}}/pet/:petId"
      method: GET
      headers:
        - name: api_key
          value: "{{apiKey}}"
      params:
        - name: petId
          value: ""
          type: path
          description: ID of pet to return
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "id": 10,
            "name": "doggie",
            "category": {
              "id": 1,
              "name": "Dogs"
            },
            "photoUrls": [],
            "tags": [
              {
                "id": 0,
                "name": ""
              }
            ],
            "status": "available"
          }
  - name: 200 Response
    description: successful operation
    request:
      url: "{{baseUrl}}/pet/:petId"
      method: GET
      headers:
        - name: api_key
          value: "{{apiKey}}"
      params:
        - name: petId
          value: ""
          type: path
          description: ID of pet to return
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/xml
      body:
        type: xml
        data: |-
          {
            "id": 10,
            "name": "doggie",
            "category": {
              "id": 1,
              "name": "Dogs"
            },
            "photoUrls": [],
            "tags": [
              {
                "id": 0,
                "name": ""
              }
            ],
            "status": "available"
          }
  - name: 400 Response
    description: Invalid ID supplied
    request:
      url: "{{baseUrl}}/pet/:petId"
      method: GET
      headers:
        - name: api_key
          value: "{{apiKey}}"
      params:
        - name: petId
          value: ""
          type: path
          description: ID of pet to return
    response:
      status: 400
      statusText: Bad Request
      body:
        type: text
        data: ""
  - name: 404 Response
    description: Pet not found
    request:
      url: "{{baseUrl}}/pet/:petId"
      method: GET
      headers:
        - name: api_key
          value: "{{apiKey}}"
      params:
        - name: petId
          value: ""
          type: path
          description: ID of pet to return
    response:
      status: 404
      statusText: Not Found
      body:
        type: text
        data: ""
  - name: default Response
    description: Unexpected error
    request:
      url: "{{baseUrl}}/pet/:petId"
      method: GET
      headers:
        - name: api_key
          value: "{{apiKey}}"
      params:
        - name: petId
          value: ""
          type: path
          description: ID of pet to return
    response:
      body:
        type: text
        data: ""


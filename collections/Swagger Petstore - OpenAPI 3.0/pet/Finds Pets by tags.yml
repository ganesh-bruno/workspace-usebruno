info:
  name: Finds Pets by tags.
  type: http
  seq: 4
  tags:
    - pet

http:
  method: GET
  url: "{{baseUrl}}/pet/findByTags"
  params:
    - name: tags
      value: "[]"
      type: query
      description: Tags to filter by
  auth:
    type: oauth2
    flow: implicit
    authorizationUrl: https://petstore.swagger.io/oauth/authorize
    callbackUrl: "{{oauth_callback_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
    scope: write:pets read:pets
    state: "{{oauth_state}}"
    tokenConfig:
      placement:
        header: Bearer
      source: access_token
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: successful operation
    request:
      url: "{{baseUrl}}/pet/findByTags"
      method: GET
      params:
        - name: tags
          value: "[]"
          type: query
          description: Tags to filter by
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          [
            {
              "id": 10,
              "name": "doggie",
              "category": {
                "id": 1,
                "name": "Dogs"
              },
              "photoUrls": [],
              "tags": [
                {
                  "id": 0,
                  "name": ""
                }
              ],
              "status": "available"
            }
          ]
  - name: 200 Response
    description: successful operation
    request:
      url: "{{baseUrl}}/pet/findByTags"
      method: GET
      params:
        - name: tags
          value: "[]"
          type: query
          description: Tags to filter by
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/xml
      body:
        type: xml
        data: |-
          [
            {
              "id": 10,
              "name": "doggie",
              "category": {
                "id": 1,
                "name": "Dogs"
              },
              "photoUrls": [],
              "tags": [
                {
                  "id": 0,
                  "name": ""
                }
              ],
              "status": "available"
            }
          ]
  - name: 400 Response
    description: Invalid tag value
    request:
      url: "{{baseUrl}}/pet/findByTags"
      method: GET
      params:
        - name: tags
          value: "[]"
          type: query
          description: Tags to filter by
    response:
      status: 400
      statusText: Bad Request
      body:
        type: text
        data: ""
  - name: default Response
    description: Unexpected error
    request:
      url: "{{baseUrl}}/pet/findByTags"
      method: GET
      params:
        - name: tags
          value: "[]"
          type: query
          description: Tags to filter by
    response:
      body:
        type: text
        data: ""

docs: Multiple tags can be provided with comma separated strings. Use tag1, tag2, tag3 for testing.

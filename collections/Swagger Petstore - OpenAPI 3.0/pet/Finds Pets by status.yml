          type: query
          description: Status values that need to be considered for filter
          disabled: true
    response:
      status: 400
      statusText: Bad Request
      body:
        type: text
        data: ""
  - name: default Response
    description: Unexpected error
    request:
      url: "{{baseUrl}}/pet/findByStatus"
      method: GET
      params:
        - name: status
          value: available
          type: query
          description: Status values that need to be considered for filter
        - name: status
          value: pending
          type: query
          description: Status values that need to be considered for filter
          disabled: true
        - name: status
          value: sold

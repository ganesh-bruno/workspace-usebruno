  - name: 400 Response
    description: Invalid status value
    request:
      url: "{{baseUrl}}/pet/findByStatus"
      method: GET
      params:
        - name: status
          value: available
          type: query
          description: Status values that need to be considered for filter
        - name: status
          value: pending

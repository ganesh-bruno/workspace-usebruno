info:
  name: Deletes a pet.
  type: http
  seq: 7
  tags:
    - pet

http:
  method: DELETE
  url: "{{baseUrl}}/pet/:petId"
  headers:
    - name: api_key
      value: ""
      disabled: true
  params:
    - name: petId
      value: ""
      type: path
      description: Pet id to delete
  auth:
    type: oauth2
    flow: implicit
    authorizationUrl: https://petstore.swagger.io/oauth/authorize
    callbackUrl: "{{oauth_callback_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
    scope: write:pets read:pets
    state: "{{oauth_state}}"
    tokenConfig:
      placement:
        header: Bearer
      source: access_token
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5


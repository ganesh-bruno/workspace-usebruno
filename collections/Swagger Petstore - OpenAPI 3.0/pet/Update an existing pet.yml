info:
  name: Update an existing pet.
  type: http
  seq: 1
  tags:
    - pet

http:
  method: PUT
  url: "{{baseUrl}}/pet"
  body:
    type: json
    data: |-
      {
        "id": 10,
        "name": "doggie",
        "category": {
          "id": 1,
          "name": "Dogs"
        },
        "photoUrls": [],
        "tags": [
          {
            "id": 0,
            "name": ""
          }
        ],
        "status": "available"
      }
  auth:
    type: oauth2
    flow: implicit
    authorizationUrl: https://petstore.swagger.io/oauth/authorize
    callbackUrl: "{{oauth_callback_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
    scope: write:pets read:pets
    state: "{{oauth_state}}"
    tokenConfig:
      placement:
        header: Bearer
      source: access_token
    settings:
      autoFetchToken: false
      autoRefreshToken: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5


info:
  name: Creates list of users with given input array.
  type: http
  seq: 2
  tags:
    - user

http:
  method: POST
  url: "{{baseUrl}}/user/createWithList"
  body:
    type: json
    data: |-
      [
        {
          "id": 10,
          "username": "theUser",
          "firstName": "John",
          "lastName": "James",
          "email": "john@email.com",
          "password": "12345",
          "phone": "12345",
          "userStatus": 1
        }
      ]
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5


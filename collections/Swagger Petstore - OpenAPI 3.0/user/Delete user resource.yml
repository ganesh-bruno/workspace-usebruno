info:
  name: Delete user resource.
  type: http
  seq: 7
  tags:
    - user

http:
  method: DELETE
  url: "{{baseUrl}}/user/:username"
  params:
    - name: username
      value: ""
      type: path
      description: The name that needs to be deleted
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: User deleted
    request:
      url: "{{baseUrl}}/user/:username"
      method: DELETE
      params:
        - name: username
          value: ""
          type: path
          description: The name that needs to be deleted
    response:
      status: 200
      statusText: OK
      body:
        type: text
        data: ""
  - name: 400 Response
    description: Invalid username supplied
    request:
      url: "{{baseUrl}}/user/:username"
      method: DELETE
      params:
        - name: username
          value: ""
          type: path
          description: The name that needs to be deleted
    response:
      status: 400
      statusText: Bad Request
      body:
        type: text
        data: ""
  - name: 404 Response
    description: User not found
    request:
      url: "{{baseUrl}}/user/:username"
      method: DELETE
      params:
        - name: username
          value: ""
          type: path

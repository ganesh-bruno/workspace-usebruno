info:
  name: Find purchase order by ID.
  type: http
  seq: 3
  tags:
    - store

http:
  method: GET
  url: "{{baseUrl}}/store/order/:orderId"
  params:
    - name: orderId
      value: ""
      type: path
      description: ID of order that needs to be fetched
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: successful operation
    request:
      url: "{{baseUrl}}/store/order/:orderId"
      method: GET
      params:
        - name: orderId
          value: ""
          type: path
          description: ID of order that needs to be fetched
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "id": 10,
            "petId": 198772,
            "quantity": 7,
            "shipDate": "",
            "status": "approved",
            "complete": false
          }
  - name: 200 Response
    description: successful operation
    request:
      url: "{{baseUrl}}/store/order/:orderId"
      method: GET
      params:
        - name: orderId
          value: ""
          type: path
          description: ID of order that needs to be fetched
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/xml
      body:
        type: xml
        data: |-
          {
            "id": 10,
            "petId": 198772,
            "quantity": 7,
            "shipDate": "",
            "status": "approved",
            "complete": false
          }
  - name: 400 Response
    description: Invalid ID supplied
    request:
      url: "{{baseUrl}}/store/order/:orderId"
      method: GET
      params:
        - name: orderId
          value: ""
          type: path
          description: ID of order that needs to be fetched
    response:
      status: 400
      statusText: Bad Request
      body:
        type: text
        data: ""
  - name: 404 Response
    description: Order not found
    request:
      url: "{{baseUrl}}/store/order/:orderId"
      method: GET
      params:
        - name: orderId
          value: ""
          type: path
          description: ID of order that needs to be fetched
    response:
      status: 404
      statusText: Not Found
      body:
        type: text
        data: ""
  - name: default Response
    description: Unexpected error
    request:
      url: "{{baseUrl}}/store/order/:orderId"
      method: GET
      params:
        - name: orderId
          value: ""
          type: path
          description: ID of order that needs to be fetched
    response:
      body:
        type: text
        data: ""

docs: For valid response try integer IDs with value <= 5 or > 10. Other values will generate exceptions.

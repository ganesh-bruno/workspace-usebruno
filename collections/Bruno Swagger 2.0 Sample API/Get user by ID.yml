info:
  name: Get user by ID
  type: http
  seq: 3

http:
  method: GET
  url: "{{baseUrl}}/users/:id"
  params:
    - name: id
      value: "231"
      type: path
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Successful response
    request:
      url: "{{baseUrl}}/users/:id"
      method: GET
      params:
        - name: id
          value: ""
          type: path
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "id": 1,
            "name": "Ganesh",
            "email": "ganesh@example.com"
          }
  - name: 404 Response
    description: User not found
    request:
      url: "{{baseUrl}}/users/:id"
      method: GET
      params:
        - name: id
          value: ""
          type: path
    response:
      status: 404
      statusText: Not Found
      body:
        type: text
        data: ""

docs: Returns a single user

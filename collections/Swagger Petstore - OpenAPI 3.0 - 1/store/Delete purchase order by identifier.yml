info:
  name: Delete purchase order by identifier.
  type: http
  seq: 4
  tags:
    - store

http:
  method: DELETE
  url: "{{baseUrl}}/store/order/:orderId"
  params:
    - name: orderId
      value: ""
      type: path
      description: ID of the order that needs to be deleted
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: order deleted
    request:
      url: "{{baseUrl}}/store/order/:orderId"
      method: DELETE
      params:
        - name: orderId
          value: ""
          type: path
          description: ID of the order that needs to be deleted
    response:
      status: 200
      statusText: OK
      body:
        type: text
        data: ""
  - name: 400 Response
    description: Invalid ID supplied
    request:
      url: "{{baseUrl}}/store/order/:orderId"
      method: DELETE
      params:
        - name: orderId
          value: ""
          type: path
          description: ID of the order that needs to be deleted
    response:
      status: 400
      statusText: Bad Request
      body:
        type: text
        data: ""
  - name: 404 Response
    description: Order not found
    request:
      url: "{{baseUrl}}/store/order/:orderId"
      method: DELETE
      params:
        - name: orderId
          value: ""
          type: path
          description: ID of the order that needs to be deleted
    response:
      status: 404
      statusText: Not Found
      body:
        type: text
        data: ""
  - name: default Response
    description: Unexpected error
    request:
      url: "{{baseUrl}}/store/order/:orderId"
      method: DELETE
      params:
        - name: orderId
          value: ""
          type: path
          description: ID of the order that needs to be deleted
    response:
      body:
        type: text
        data: ""

docs: For valid response try integer IDs with value < 1000. Anything above 1000 or non-integers will generate API errors.

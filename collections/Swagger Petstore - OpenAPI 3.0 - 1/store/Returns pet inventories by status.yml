info:
  name: Returns pet inventories by status.
  type: http
  seq: 1
  tags:
    - store

http:
  method: GET
  url: "{{baseUrl}}/store/inventory"
  headers:
    - name: api_key
      value: "{{apiKey}}"
  auth:
    type: apikey
    key: api_key
    value: "{{apiKey}}"
    placement: header

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: successful operation
    request:
      url: "{{baseUrl}}/store/inventory"
      method: GET
      headers:
        - name: api_key
          value: "{{apiKey}}"
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: "{}"
  - name: default Response
    description: Unexpected error
    request:
      url: "{{baseUrl}}/store/inventory"
      method: GET
      headers:
        - name: api_key
          value: "{{apiKey}}"
    response:
      body:
        type: text
        data: ""

docs: Returns a map of status codes to quantities.

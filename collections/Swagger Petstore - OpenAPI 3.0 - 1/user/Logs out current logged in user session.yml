info:
  name: Logs out current logged in user session.
  type: http
  seq: 4
  tags:
    - user

http:
  method: GET
  url: "{{baseUrl}}/user/logout"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: successful operation
    request:
      url: "{{baseUrl}}/user/logout"
      method: GET
    response:
      status: 200
      statusText: OK
      body:
        type: text
        data: ""
  - name: default Response
    description: Unexpected error
    request:
      url: "{{baseUrl}}/user/logout"
      method: GET
    response:
      body:
        type: text
        data: ""

docs: Log user out of the system.

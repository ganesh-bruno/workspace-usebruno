info:
  name: Get user by user name.
  type: http
  seq: 5
  tags:
    - user

http:
  method: GET
  url: "{{baseUrl}}/user/:username"
  params:
    - name: username
      value: ""
      type: path
      description: The name that needs to be fetched. Use user1 for testing
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: successful operation
    request:
      url: "{{baseUrl}}/user/:username"
      method: GET
      params:
        - name: username
          value: ""
          type: path
          description: The name that needs to be fetched. Use user1 for testing
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "id": 10,
            "username": "theUser",
            "firstName": "John",
            "lastName": "James",
            "email": "john@email.com",
            "password": "12345",
            "phone": "12345",
            "userStatus": 1
          }
  - name: 200 Response
    description: successful operation
    request:
      url: "{{baseUrl}}/user/:username"
      method: GET
      params:
        - name: username
          value: ""
          type: path
          description: The name that needs to be fetched. Use user1 for testing
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/xml
      body:
        type: xml
        data: |-
          {
            "id": 10,
            "username": "theUser",
            "firstName": "John",
            "lastName": "James",
            "email": "john@email.com",
            "password": "12345",
            "phone": "12345",
            "userStatus": 1
          }
  - name: 400 Response
    description: Invalid username supplied
    request:
      url: "{{baseUrl}}/user/:username"
      method: GET
      params:
        - name: username
          value: ""
          type: path
          description: The name that needs to be fetched. Use user1 for testing
    response:
      status: 400
      statusText: Bad Request
      body:
        type: text
        data: ""
  - name: 404 Response
    description: User not found
    request:
      url: "{{baseUrl}}/user/:username"
      method: GET
      params:
        - name: username
          value: ""
          type: path
          description: The name that needs to be fetched. Use user1 for testing
    response:
      status: 404
      statusText: Not Found
      body:
        type: text
        data: ""
  - name: default Response
    description: Unexpected error
    request:
      url: "{{baseUrl}}/user/:username"
      method: GET

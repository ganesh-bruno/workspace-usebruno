  tags:
    - user

http:
  method: PUT
  url: "{{baseUrl}}/user/:username"
  params:
    - name: username
      value: ""
      type: path
      description: name that need to be deleted
  body:
    type: json
    data: |-
      {
        "id": 10,
        "username": "theUser",
        "firstName": "John",
        "lastName": "James",
        "email": "john@email.com",
        "password": "12345",
        "phone": "12345",
        "userStatus": 1
      }
  auth: inherit

